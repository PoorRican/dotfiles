# define servers
[language-server.ty]
command = "ty"
args    = ["server"]

[language-server.pyright]
command = "pyright-langserver"
args    = ["stdio"]

[language-server.pyrefly]
command = "pyrefly"
args    = ["lsp"]

[language-server.jinja-lsp]
command = "jinja-lsp"
args    = ["--stdio"]

[language-server.lemminx]
command = "lemminx"

[language-server.sqls]
command = "sqls"


# attach servers
[[language]]
name = "python"
language-servers = ["ty", "pyright", "pyrefly"]

[[language]]
name = "markdown"
language-servers = ["markdown-oxide"]

[[language]]
name = "html"
language-servers = ["superhtml"]

[[language]]
name = "jinja"
language-servers = ["jinja-lsp"]

[[language]]
name = "sql"
language-servers = ["sqls"]

[[language]]
name = "xml"
language-servers = ["lemminx"]

[[language]]
name = "yaml"
language-servers = ["yaml-language-server"]
