; Polybar config for cbox/i3.
; Uses the legacy .old/i3config palette and the repo's ░▒▓ statusline vibe.

[colors]
background = #2B2C2B
background-alt = #353836
foreground = #FDF6E3
foreground-alt = #EEE8D5
accent = #16A085
urgent = #E5201D
separator = #454947
muted = #595B5B

[bar/main]
width = 100%
height = 28
radius = 0
fixed-center = true
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
line-color = ${colors.accent}
border-size = 0
padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = Font Awesome 7 Free Solid:size=10;2
font-2 = Font Awesome 7 Brands:size=10;2

modules-left = i3
modules-center = date
modules-right = filesystem cpu memory pulseaudio bluetooth network tray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
reverse-scroll = true
strip-wsnumbers = false
pin-workspaces = true

label-focused = ░▒▓ %name% ▓▒░
label-focused-background = ${colors.accent}
label-focused-foreground = ${colors.background}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-background = ${colors.background-alt}
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 1

label-visible = %name%
label-visible-background = ${colors.muted}
label-visible-foreground = ${colors.foreground}
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.urgent}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 1

label-mode = %mode%
label-mode-background = ${colors.urgent}
label-mode-foreground = ${colors.foreground}
label-mode-padding = 1

[module/date]
type = internal/date
interval = 5
date = %a %Y-%m-%d
time = %H:%M
label = ░▒▓ %date% %time% ▓▒░
label-foreground = ${colors.foreground}

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
label-mounted =  %free%
label-mounted-foreground = ${colors.foreground-alt}
label-unmounted =  n/a
label-unmounted-foreground = ${colors.muted}

[module/cpu]
type = internal/cpu
interval = 2
label =  %percentage%%
label-foreground = ${colors.foreground-alt}

[module/memory]
type = internal/memory
interval = 2
label =  %percentage_used%%
label-foreground = ${colors.foreground-alt}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted =  muted
label-muted-foreground = ${colors.muted}
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
click-left = pavucontrol &
click-right = pavucontrol &

[module/bluetooth]
type = custom/script
exec = ~/.local/bin/polybar-bluetooth
interval = 5
format = <label>
label = %output%
label-foreground = ${colors.foreground-alt}
click-left = ~/.local/bin/i3-bluetooth-keyboard connect &
click-right = ~/.local/bin/i3-bluetooth-keyboard pair &
click-middle = blueman-manager &

[module/tray]
type = internal/tray
format = <tray>
tray-spacing = 2
tray-padding = 2

[module/network]
type = internal/network
interface-type = wired
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected =  %local_ip%
label-connected-foreground = ${colors.foreground-alt}
label-disconnected =  offline
label-disconnected-foreground = ${colors.muted}
